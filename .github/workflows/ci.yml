name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Run tests (excludes enterprise/bench — moved to mg-enterprise)
        run: npx vitest run --exclude='**/{enterprise,bench}/**'

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build distribution
        run: ./build.sh
      - name: Verify distribution archive
        run: test -f dist/miniature-guacamole.tar.gz
