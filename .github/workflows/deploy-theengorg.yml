name: Deploy TheEngOrg

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/deploy-theengorg.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            docs/package-lock.json

      - name: Build marketing site
        run: |
          cd site
          npm ci
          npm run build
          echo "Marketing site built ($(du -sh dist/ | cut -f1))"

      - name: Build docs site
        run: |
          cd docs
          npm ci
          npm run build
          echo "Docs site built ($(du -sh .vitepress/dist/ | cut -f1))"

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /srv/theengorg/site /srv/theengorg/docs

      - name: Sync marketing site
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: site/dist/
          remote_path: /srv/theengorg/site/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: root
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Sync docs site
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: docs/.vitepress/dist/
          remote_path: /srv/theengorg/docs/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: root
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Reload Caddy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile 2>/dev/null || true
            echo "TheEngOrg deployed at $(date)"
            echo "  Marketing: https://theengorg.wontonwebworks.com"
            echo "  Docs:      https://docs.theengorg.wontonwebworks.com"
