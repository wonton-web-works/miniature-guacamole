version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mg_postgres
    environment:
      POSTGRES_USER: mg
      POSTGRES_PASSWORD: mg
      POSTGRES_DB: mg_memory
    ports:
      - "5432:5432"
    volumes:
      - mg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mg -d mg_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mg_postgres_data:
    driver: local
