<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified favicon version of avocado chip -->
  <path d="M 50 10
           C 70 10, 85 20, 90 45
           C 92 55, 92 60, 90 70
           C 85 85, 70 95, 50 95
           C 30 95, 15 85, 10 70
           C 8 60, 8 55, 10 45
           C 15 20, 30 10, 50 10 Z"
        fill="#4A7C59"/>

  <!-- Pit with circuit -->
  <circle cx="50" cy="50" r="20" fill="#2D3B2D"/>

  <!-- Circuit cross -->
  <g stroke="#7C9C7C" stroke-width="2" opacity="0.6">
    <line x1="40" y1="50" x2="60" y2="50"/>
    <line x1="50" y1="40" x2="50" y2="60"/>
  </g>
</svg>
