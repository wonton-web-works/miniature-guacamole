<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="flesh" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8FBC8F"/>
      <stop offset="45%" stop-color="#5A8C69"/>
      <stop offset="100%" stop-color="#4A7C59"/>
    </radialGradient>

    <radialGradient id="pit" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#5A4A3A"/>
      <stop offset="50%" stop-color="#3D2E1E"/>
      <stop offset="100%" stop-color="#2A1F14"/>
    </radialGradient>

    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3B2D"/>
      <stop offset="100%" stop-color="#1A2A1A"/>
    </linearGradient>
  </defs>

  <!-- Avocado shape: pear/teardrop, narrow at top (stem), wide at bottom -->
  <path d="M 120 18
           C 100 18, 82 28, 72 48
           C 60 72, 52 100, 50 125
           C 48 148, 52 168, 62 184
           C 74 202, 92 215, 120 218
           C 148 215, 166 202, 178 184
           C 188 168, 192 148, 190 125
           C 188 100, 180 72, 168 48
           C 158 28, 140 18, 120 18 Z"
        fill="url(#flesh)"
        stroke="url(#skin)"
        stroke-width="3"/>

  <!-- Inner flesh highlight -->
  <path d="M 100 55
           C 85 65, 75 85, 70 110
           C 68 125, 72 140, 80 148"
        fill="none"
        stroke="#A8D8A8"
        stroke-width="6"
        stroke-linecap="round"
        opacity="0.25"/>

  <!-- Pit: centered at (120, 130) in lower body -->
  <circle cx="120" cy="130" r="42"
          fill="url(#pit)"
          stroke="#1A1208"
          stroke-width="1.5"/>

  <!-- Pit highlight -->
  <ellipse cx="108" cy="117" rx="16" ry="12"
           fill="#6A5A4A"
           opacity="0.3"
           transform="rotate(-15 108 117)"/>

  <!-- Circuit traces on pit -->
  <g stroke="#2E8B8B" stroke-width="1.2" fill="none" opacity="0.7">
    <line x1="100" y1="130" x2="140" y2="130"/>
    <line x1="120" y1="110" x2="120" y2="150"/>
    <circle cx="120" cy="130" r="14" stroke-width="0.8"/>
    <circle cx="120" cy="130" r="28" stroke-width="0.6" stroke-dasharray="4 3"/>
    <line x1="106" y1="116" x2="113" y2="123"/>
    <line x1="134" y1="116" x2="127" y2="123"/>
    <line x1="134" y1="144" x2="127" y2="137"/>
    <line x1="106" y1="144" x2="113" y2="137"/>
  </g>

  <!-- Circuit pads -->
  <g fill="#2E8B8B" opacity="0.8">
    <rect x="104" y="114" width="3" height="3" rx="0.5"/>
    <rect x="133" y="114" width="3" height="3" rx="0.5"/>
    <rect x="133" y="143" width="3" height="3" rx="0.5"/>
    <rect x="104" y="143" width="3" height="3" rx="0.5"/>
  </g>

  <!-- Central processor dot -->
  <circle cx="120" cy="130" r="3.5" fill="#2E8B8B" opacity="0.9"/>
  <circle cx="120" cy="130" r="1.5" fill="#C8E6D0"/>
</svg>
