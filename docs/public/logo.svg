<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Avocado Chip Logo: Cross-section with microprocessor pit -->
  <defs>
    <radialGradient id="pitGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3A4A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3B2D;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Avocado flesh (rounded geometric silhouette) -->
  <path d="M 100 20
           C 135 20, 165 35, 175 70
           C 180 90, 180 110, 175 130
           C 165 165, 135 180, 100 180
           C 65 180, 35 165, 25 130
           C 20 110, 20 90, 25 70
           C 35 35, 65 20, 100 20 Z"
        fill="#4A7C59"
        stroke="#3A4A3A"
        stroke-width="2"/>

  <!-- Pit as microprocessor die/node graph hub -->
  <circle cx="100" cy="100" r="35" fill="url(#pitGradient)" stroke="#1A2A1A" stroke-width="1.5"/>

  <!-- Processor grid pattern in pit -->
  <g opacity="0.4" stroke="#7C9C7C" stroke-width="0.8">
    <line x1="85" y1="100" x2="115" y2="100"/>
    <line x1="100" y1="85" x2="100" y2="115"/>
    <line x1="90" y1="90" x2="110" y2="110"/>
    <line x1="110" y1="90" x2="90" y2="110"/>
  </g>

  <!-- Connection nodes radiating from pit to edge (6 connections) -->
  <g stroke="#3A4A3A" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Top -->
    <line x1="100" y1="65" x2="100" y2="30"/>
    <circle cx="100" cy="30" r="3" fill="#2D3B2D"/>

    <!-- Top-right -->
    <line x1="125" y1="78" x2="155" y2="55"/>
    <circle cx="155" cy="55" r="3" fill="#2D3B2D"/>

    <!-- Bottom-right -->
    <line x1="125" y1="122" x2="155" y2="145"/>
    <circle cx="155" cy="145" r="3" fill="#2D3B2D"/>

    <!-- Bottom -->
    <line x1="100" y1="135" x2="100" y2="170"/>
    <circle cx="100" cy="170" r="3" fill="#2D3B2D"/>

    <!-- Bottom-left -->
    <line x1="75" y1="122" x2="45" y2="145"/>
    <circle cx="45" cy="145" r="3" fill="#2D3B2D"/>

    <!-- Top-left -->
    <line x1="75" y1="78" x2="45" y2="55"/>
    <circle cx="45" cy="55" r="3" fill="#2D3B2D"/>
  </g>

  <!-- Connection nodes at pit edge -->
  <g fill="#2D3B2D">
    <circle cx="100" cy="65" r="2.5"/>
    <circle cx="125" cy="78" r="2.5"/>
    <circle cx="125" cy="122" r="2.5"/>
    <circle cx="100" cy="135" r="2.5"/>
    <circle cx="75" cy="122" r="2.5"/>
    <circle cx="75" cy="78" r="2.5"/>
  </g>
</svg>
