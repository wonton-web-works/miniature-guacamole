<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- OpenGraph image: 1200x630 for social media previews -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3B2D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3A4A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3B2D;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pitGradientOg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3A4A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3B2D;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Subtle pattern overlay -->
  <g opacity="0.03">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#C8E6D0"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Logo (left side, scaled up) -->
  <g transform="translate(120, 165)">
    <!-- Avocado flesh -->
    <path d="M 150 30
             C 202.5 30, 247.5 52.5, 262.5 105
             C 270 135, 270 165, 262.5 195
             C 247.5 247.5, 202.5 270, 150 270
             C 97.5 270, 52.5 247.5, 37.5 195
             C 30 165, 30 135, 37.5 105
             C 52.5 52.5, 97.5 30, 150 30 Z"
          fill="#4A7C59"
          stroke="#3A4A3A"
          stroke-width="3"/>

    <!-- Pit -->
    <circle cx="150" cy="150" r="52.5" fill="url(#pitGradientOg)" stroke="#1A2A1A" stroke-width="2"/>

    <!-- Processor grid -->
    <g opacity="0.4" stroke="#7C9C7C" stroke-width="1.5">
      <line x1="127.5" y1="150" x2="172.5" y2="150"/>
      <line x1="150" y1="127.5" x2="150" y2="172.5"/>
      <line x1="135" y1="135" x2="165" y2="165"/>
      <line x1="165" y1="135" x2="135" y2="165"/>
    </g>

    <!-- Connection lines -->
    <g stroke="#3A4A3A" stroke-width="2" fill="none" opacity="0.6">
      <line x1="150" y1="97.5" x2="150" y2="45"/>
      <circle cx="150" cy="45" r="4" fill="#2D3B2D"/>
      <line x1="187.5" y1="117" x2="232.5" y2="82.5"/>
      <circle cx="232.5" cy="82.5" r="4" fill="#2D3B2D"/>
      <line x1="187.5" y1="183" x2="232.5" y2="217.5"/>
      <circle cx="232.5" cy="217.5" r="4" fill="#2D3B2D"/>
      <line x1="150" y1="202.5" x2="150" y2="255"/>
      <circle cx="150" cy="255" r="4" fill="#2D3B2D"/>
      <line x1="112.5" y1="183" x2="67.5" y2="217.5"/>
      <circle cx="67.5" cy="217.5" r="4" fill="#2D3B2D"/>
      <line x1="112.5" y1="117" x2="67.5" y2="82.5"/>
      <circle cx="67.5" cy="82.5" r="4" fill="#2D3B2D"/>
    </g>
  </g>

  <!-- Text content (right side) -->
  <g>
    <!-- Wordmark -->
    <text x="520" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#C8E6D0" letter-spacing="-1">
      miniature-guacamole
    </text>

    <!-- Tagline -->
    <text x="520" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#B8D4B0" opacity="0.9">
      <tspan x="520" dy="0">Turn Claude Code into a</tspan>
      <tspan x="520" dy="40">19-agent product development team</tspan>
    </text>

    <!-- Feature highlights -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#7C9C7C" opacity="0.8">
      <text x="520" y="430">19 Specialized Agents • 16 Skills • CAD Workflows</text>
    </g>
  </g>

  <!-- Accent line -->
  <line x1="520" y1="270" x2="1080" y2="270" stroke="#4A7C59" stroke-width="2" opacity="0.5"/>
</svg>
