episode_id: ep01
episode_title: "Your Claude Code Just Became a Team"

scenes:
  - scene_id: "01-hook"
    narrator_agent: "cto"
    narration: "Watch what happens when you ask Claude Code to plan a feature."
    terminal_commands:
      - command: "claude"
        wait_after_ms: 30000
    wait_ms: 5000

  - scene_id: "02-leadership-command"
    narrator_agent: "engineering-manager"
    narration: "One command. The leadership team skill spawns three agents: a CEO for business value, a CTO for technical architecture, and an Engineering Director for operational readiness. Each one evaluates the feature from their perspective."
    terminal_commands:
      - command: "/mg-leadership-team plan a user authentication system"
        wait_after_ms: 120000
    wait_ms: 5000

  - scene_id: "03-assessment"
    narrator_agent: "cto"
    narration: "The CEO checks business alignment and ROI. The CTO evaluates architecture, risks, and dependencies. The Engineering Director assesses timeline, capacity, and delivery risk. Three perspectives, one command, zero hallway meetings."
    terminal_commands: []
    wait_ms: 5000

  - scene_id: "04-workstreams"
    narrator_agent: "product-owner"
    narration: "Real workstreams with acceptance criteria. Not a summary. Not a suggestion. An actual plan your team can execute. Database schema, auth endpoints, session management, security review — each one scoped and testable."
    terminal_commands: []
    wait_ms: 5000

  - scene_id: "05-explanation"
    narrator_agent: "staff-engineer"
    narration: "That was miniature-guacamole. 19 agents, 16 skills, zero hallway meetings. Each agent has a defined role, a bounded scope, and a protocol for handing off to the next. One framework that turns Claude Code into a product development team."
    terminal_commands: []
    wait_ms: 5000

  - scene_id: "06-cta"
    narrator_agent: "engineering-manager"
    narration: "Next episode: how to install it in 60 seconds. Link in the description."
    terminal_commands: []
    wait_ms: 5000
