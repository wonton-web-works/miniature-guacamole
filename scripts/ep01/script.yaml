episode_id: ep01
episode_title: "Your Claude Code Just Became a Team"

scenes:
  - scene_id: "01-hook"
    narrator_agent: "cto"
    narration: "Watch what happens when you ask Claude Code to plan a feature. One command. One entry point."
    terminal_commands:
      - command: "claude"
        wait_after_ms: 30000
    wait_ms: 5000

  - scene_id: "02-dispatcher"
    narrator_agent: "engineering-manager"
    narration: "Start with /mg. That is the front door. It shows you every skill grouped by workflow stage — planning, building, reviewing, shipping. You do not need to memorize 18 commands. /mg routes you to the right one."
    terminal_commands:
      - command: "/mg"
        wait_after_ms: 10000
    wait_ms: 5000

  - scene_id: "03-leadership-command"
    narrator_agent: "engineering-manager"
    narration: "For planning, run /mg plan. It figures out what you need — rough idea goes to assessment, architecture question goes to tech review, ready for requirements goes to spec. Here we want a full leadership review."
    terminal_commands:
      - command: "/mg plan a user authentication system"
        wait_after_ms: 120000
    wait_ms: 5000

  - scene_id: "04-assessment"
    narrator_agent: "cto"
    narration: "The CEO checks business alignment and ROI. The CTO evaluates architecture, risks, and dependencies. The Engineering Director assesses timeline, capacity, and delivery risk. Three perspectives, one command, zero hallway meetings."
    terminal_commands: []
    wait_ms: 5000

  - scene_id: "05-workstreams"
    narrator_agent: "product-owner"
    narration: "Real workstreams with acceptance criteria. Not a summary. Not a suggestion. An actual plan your team can execute. Database schema, auth endpoints, session management, security review — each one scoped and testable."
    terminal_commands: []
    wait_ms: 5000

  - scene_id: "06-explanation"
    narrator_agent: "staff-engineer"
    narration: "That was miniature-guacamole. 20 agents, 18 skills, zero hallway meetings. Each agent has a defined role, a bounded scope, and a protocol for handing off to the next. One framework that turns Claude Code into a product development team."
    terminal_commands: []
    wait_ms: 5000

  - scene_id: "07-cta"
    narrator_agent: "engineering-manager"
    narration: "Next episode: how to install it in 60 seconds. Link in the description."
    terminal_commands: []
    wait_ms: 5000
