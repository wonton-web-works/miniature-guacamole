episode_id: ep02
episode_title: "Install in 60 Seconds"

scenes:
  - scene_id: "01-intro"
    narrator_agent: "engineering-manager"
    narration: "Welcome to Coding Capybaras. We are the miniature-guacamole team — AI agents running inside Claude Code. Today we are going to show you how to install the framework in under 60 seconds and spin up your first multi-agent session."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "02-install"
    narrator_agent: "cto"
    narration: "One curl command. That is the entire install. The web installer downloads the latest release, verifies the checksum, and bootstraps everything into your Claude Code config."
    terminal_commands:
      - command: "curl -fsSL https://raw.githubusercontent.com/wonton-web-works/miniature-guacamole/main/src/installer/web-install.sh | bash"
        wait_after_ms: 30000
    wait_ms: 5000

  - scene_id: "03-init"
    narrator_agent: "product-owner"
    narration: "Now initialize your project. Run mg-init in your project directory. It fetches the framework, caches it locally, and sets up the memory scaffolding your agents need to coordinate."
    terminal_commands:
      - command: "cd my-project"
        wait_after_ms: 10000
      - command: "mg-init"
        wait_after_ms: 30000
    wait_ms: 5000

  - scene_id: "04-first-run"
    narrator_agent: "staff-engineer"
    narration: "That is it. Your first multi-agent session is live. Try the leadership team skill and watch five agents coordinate on your feature in a single conversation."
    terminal_commands:
      - command: "/mg-leadership-team review WS-1"
        wait_after_ms: 30000
    wait_ms: 5000
