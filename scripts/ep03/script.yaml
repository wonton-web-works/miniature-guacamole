episode_id: ep03
episode_title: "The CAD Cycle: How We Build Features"

scenes:
  - scene_id: "01-intro"
    narrator_agent: "cto"
    narration: "Most teams call Claude directly. You describe a feature, Claude writes some code, you paste it in and hope for the best. That works for small things. It breaks down the moment you need tests, review, coverage gates, and a second opinion on the architecture. That is what the CAD cycle solves."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "02-what-is-cad"
    narrator_agent: "cto"
    narration: "CAD stands for Constraint-Driven Agentic Development. The core idea: every workstream goes through a defined sequence of agents, each with a specific job, with mechanical gates between them. The sequence is: QA writes tests first, dev implements to pass them, QA verifies coverage, staff engineer reviews if it touches architecture."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "03-start-build"
    narrator_agent: "engineering-manager"
    narration: "We kick off a build with the mg-build skill. Pass in a workstream ID. The skill reads the task queue, assembles context, and spawns the right agents in the right order."
    terminal_commands:
      - command: "/mg-build implement WS-AUTH-1"
        wait_after_ms: 1000
    wait_ms: 500

  - scene_id: "04-misuse-first"
    narrator_agent: "qa"
    narration: "The first agent to run is QA. And the first tests QA writes are misuse tests — not the happy path. We test what the function should reject before we test what it should accept. If you write golden path tests first, you anchor the implementation to the best case and miss the edges. Misuse-first forces the implementation to handle failure before it handles success."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "05-test-output"
    narrator_agent: "qa"
    narration: "QA produces a test spec with three tiers: misuse cases, boundary conditions, and then the golden path. The spec goes into memory. Dev picks it up as an artifact bundle — a pre-scoped context package with just the inputs, constraints, and gate criteria needed to implement. No full memory read. No drift."
    terminal_commands: []
    wait_ms: 1000

  - scene_id: "06-dev-implements"
    narrator_agent: "cto"
    narration: "Dev runs against the failing tests. Minimum code to pass. No speculative abstractions. The gate criteria are explicit: all tests green, coverage at or above 99 percent. If dev ships code that doesn't meet the gate, the workstream stalls — it doesn't silently proceed."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "07-gate-check"
    narrator_agent: "staff-engineer"
    narration: "After dev finishes, there is a classification step. Is this workstream mechanical — a contained change with no architectural impact — or does it touch something that needs a second set of eyes? Mechanical workstreams go through automated bash gates. Architectural workstreams get a staff engineer review. The classification rules are explicit and documented."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "08-why-it-matters"
    narrator_agent: "cto"
    narration: "The reason this matters: every step produces an artifact that the next step consumes. Tests produce specs. Specs produce implementations. Implementations produce coverage reports. Coverage reports produce gate decisions. The whole cycle is traceable. When something goes wrong, you know exactly where it broke and why."
    terminal_commands: []
    wait_ms: 500

  - scene_id: "09-cta"
    narrator_agent: "engineering-manager"
    narration: "Next episode we run the full CAD cycle on a real feature, start to finish. No skips, no edits. Link in the description."
    terminal_commands: []
    wait_ms: 500
