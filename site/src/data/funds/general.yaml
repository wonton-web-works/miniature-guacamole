fund_name: ""
access_code: "invest2026"
headline: "The AI engineering org your team is missing"
body: >
  Every engineering team has AI tools. Few have process. PrivateEnterprise gives your
  portfolio companies a complete AI engineering organization — from intake to
  merge — so their engineers ship faster with higher quality.

# Financial parameters — dynamically rendered in the deck
raise:
  amount: "$3M"
  amount_num: 3000000
  pre_money: "$9M"
  post_money: "$12M"
  ownership: "25%"
  check_size: "$3M"

financials:
  y1_base_arr: "$1.2M"
  y2_base_arr: "$3.6M"
  y3_base_arr: "$7.2M"
  y1_expected_arr: "$2.4M"
  y2_expected_arr: "$7.2M"
  y3_expected_arr: "$12M+"
  cashflow_positive: "Month 5"
  min_cash: "$2.9M"
  series_a: "Optional"

returns:
  base_exit_arr: "$15M"
  base_multiple: "6x"
  base_return: "15x"
  base_return_dollar: "$45M"
  expected_exit_arr: "$20M"
  expected_multiple: "8x"
  expected_return: "16x"
  expected_return_dollar: "$48M"
  upside_exit_arr: "$100M+"
  upside_multiple: "15x"
  upside_return: "48–66x"
  ev_weighted: "21.5x"

metrics:
  - label: "Gross margin"
    value: "95%+"
  - label: "Payback period"
    value: "< 30 days"
  - label: "Monthly API cost"
    value: "~$5K"
  - label: "ROI vs. process overhead"
    value: "10:1"
  - label: "Customer-side implementation"
    value: "Zero infra"
  - label: "Engineer velocity"
    value: "6x"
