# ============================================================================
# Product Development Team - Agent Configuration
# ============================================================================
# This is the single source of truth for agent definitions, model assignments,
# and workflow configuration. Agents poll shared memory for tasks.
# ============================================================================

# ----------------------------------------------------------------------------
# Provider Configuration
# ----------------------------------------------------------------------------
# Abstraction layer for multi-provider support. Currently using Anthropic,
# but structured to support OpenAI, Google, xAI in the future.

providers:
  anthropic:
    # Model tiers for different task complexity
    tiers:
      reasoning:    # Deep thinking, strategic decisions, complex planning
        model: claude-opus-4-6
        alias: opus
      implementation:  # Coding, detailed work, coordination
        model: claude-sonnet-4-20250514
        alias: sonnet
      fast:         # Validation, exploration, simple checks
        model: claude-haiku-3-5-20241022
        alias: haiku

  # Future providers (commented out until needed)
  # openai:
  #   tiers:
  #     reasoning:
  #       model: o1-preview
  #     implementation:
  #       model: gpt-4-turbo
  #     fast:
  #       model: gpt-4o-mini
  #
  # google:
  #   tiers:
  #     reasoning:
  #       model: gemini-2.0-pro
  #     implementation:
  #       model: gemini-2.0-flash
  #     fast:
  #       model: gemini-2.0-flash-lite

# Active provider selection
active_provider: anthropic

# ----------------------------------------------------------------------------
# Safety Configuration
# ----------------------------------------------------------------------------
# Hard constraints that agents must never violate. Enforced by hooks.

safety:
  # Commands that are NEVER allowed (enforced by .claude/hooks/safety-check.sh)
  forbidden_commands:
    - "rm -rf /"
    - "rm -rf ~"
    - "rm -rf $HOME"
    - "rm -rf /home"
    - "rm -rf /Users"
    - "chmod -R 777 /"
    - "dd if="
    - "mkfs"
    - "> /dev/"
    - "rm -rf ~/.ssh"
    - "rm -rf ~/.aws"
    - "rm -rf ~/.claude"

  # Directories agents are allowed to modify
  allowed_write_paths:
    - "./"              # Project root
    - ".claude/"        # Claude config
    - "src/"            # Source code
    - "tests/"          # Test files
    - "dist/"           # Build output
    - "node_modules/"   # Dependencies (npm manages)
    - "coverage/"       # Test coverage

  # Directories that require extra caution (prompt before modifying)
  caution_paths:
    - ".git/"           # Git internals
    - ".env"            # Environment secrets
    - "package-lock.json"

  # Safety principle for all agents
  principle: >
    Never execute commands that could harm the system, delete user data,
    or modify files outside the project directory. When in doubt, ask.

# ----------------------------------------------------------------------------
# Organization Structure
# ----------------------------------------------------------------------------

organization:
  name: Product Development Team
  description: >
    Autonomous product development organization with TDD/BDD workflow,
    99% coverage target, and visual regression testing.

# Role hierarchy for escalation paths
hierarchy:
  executive:   [ceo, cto, engineering-director]
  leadership:  [product-owner, product-manager, engineering-manager, staff-engineer, art-director]
  ic:          [dev, qa, design, ai-artist]
  operations:  [deployment-engineer]

# ----------------------------------------------------------------------------
# Agent Definitions
# ----------------------------------------------------------------------------
# Each agent has:
#   - tier: reasoning | implementation | fast (maps to model)
#   - tools: allowed Claude Code tools
#   - can_spawn: agents this role can delegate to
#   - escalates_to: who to escalate blockers to
#   - memory_patterns: what to read/write in shared memory

agents:
  # === EXECUTIVE TIER (reasoning model) ===

  ceo:
    title: Chief Executive Officer
    tier: reasoning
    description: >
      Sets business vision and strategic direction. Reviews major decisions.
      Approves significant resource allocation and priority changes.
    tools: [Read, Glob, Grep, Task]
    can_spawn: [cto, engineering-director, product-owner, art-director]
    escalates_to: null  # Top of chain
    memory_patterns:
      reads:  [strategic-decisions, escalations, workstream-status]
      writes: [strategic-decisions, approvals]

  cto:
    title: Chief Technology Officer
    tier: reasoning
    description: >
      Sets technical vision, evaluates architectures, directs engineering strategy.
      Final authority on technology choices and technical standards.
    tools: [Read, Glob, Grep, Task]
    can_spawn: [engineering-director, staff-engineer]
    escalates_to: ceo
    memory_patterns:
      reads:  [architecture-decisions, technical-debt, escalations]
      writes: [architecture-decisions, technical-standards]

  engineering-director:
    title: Engineering Director
    tier: reasoning
    description: >
      Oversees engineering operations, delivery, and team coordination.
      Manages workstream priorities and resource allocation.
    tools: [Read, Glob, Grep, Task]
    can_spawn: [engineering-manager, staff-engineer, deployment-engineer]
    escalates_to: cto
    memory_patterns:
      reads:  [workstream-status, team-capacity, blockers]
      writes: [workstream-assignments, delivery-status]

  # === LEADERSHIP TIER (implementation model) ===

  product-owner:
    title: Product Owner
    tier: implementation
    description: >
      Owns product vision and backlog prioritization. Defines what gets built
      and acceptance criteria for features.
    tools: [Read, Glob, Grep, Task]
    can_spawn: [product-manager]
    escalates_to: ceo
    memory_patterns:
      reads:  [product-roadmap, user-feedback, workstream-status]
      writes: [product-requirements, acceptance-criteria, priorities]

  product-manager:
    title: Product Manager
    tier: implementation
    description: >
      Manages feature specs, requirements, and cross-functional coordination.
      Translates product vision into actionable user stories.
    tools: [Read, Glob, Grep, Edit, Write, Task]
    can_spawn: [dev, qa, design]
    escalates_to: product-owner
    memory_patterns:
      reads:  [product-requirements, acceptance-criteria]
      writes: [user-stories, feature-specs, bdd-scenarios]

  engineering-manager:
    title: Engineering Manager
    tier: implementation
    description: >
      Manages team execution, assigns tasks, ensures delivery. Coordinates
      the TDD/BDD cycle and tracks workstream progress.
    tools: [Read, Glob, Grep, Edit, Write, Task, Bash]
    can_spawn: [dev, qa, staff-engineer]
    escalates_to: engineering-director
    memory_patterns:
      reads:  [workstream-assignments, task-status, blockers]
      writes: [task-assignments, progress-updates, blockers]

  staff-engineer:
    title: Staff Engineer
    tier: implementation
    description: >
      Technical leader, sets standards, guides complex implementations.
      Performs code review and ensures architectural compliance.
    tools: [Read, Glob, Grep, Edit, Write, Task, Bash]
    can_spawn: [dev]
    escalates_to: cto
    memory_patterns:
      reads:  [architecture-decisions, code-review-queue, technical-standards]
      writes: [code-review-results, technical-guidance, architecture-decisions]

  art-director:
    title: Art Director
    tier: implementation
    description: >
      Sets design vision, brand standards, and directs the design team.
      Approves visual changes and maintains design consistency.
    tools: [Read, Glob, Grep, Task, mcp__gemini-media__generate_image]
    can_spawn: [design, ai-artist]
    escalates_to: ceo
    memory_patterns:
      reads:  [design-system, visual-regression-reports, brand-guidelines, generated-assets]
      writes: [design-approvals, brand-guidelines, design-direction]

  # === IC TIER (implementation model, some fast) ===

  dev:
    title: Senior Fullstack Engineer
    tier: implementation
    description: >
      Implements features with TDD, DRY principles, and 99% coverage target.
      Writes minimum code to pass tests, then refactors.
    tools: [Read, Glob, Grep, Edit, Write, Bash]
    can_spawn: []  # ICs don't spawn, they consult
    can_consult: [qa, design]  # Peer collaboration (fire-and-forget)
    escalates_to: engineering-manager
    memory_patterns:
      reads:  [task-assignments, test-specs, acceptance-criteria, technical-standards]
      writes: [implementation-status, technical-decisions, blockers]

  qa:
    title: QA Engineer
    tier: implementation  # Could be 'fast' for simple test runs
    description: >
      TDD/BDD tests, Playwright E2E, visual regression with screenshots.
      Writes tests BEFORE implementation, verifies coverage.
    tools: [Read, Glob, Grep, Edit, Write, Bash]
    can_spawn: []
    can_consult: [dev, design]
    escalates_to: engineering-manager
    memory_patterns:
      reads:  [bdd-scenarios, acceptance-criteria, implementation-status]
      writes: [test-specs, test-results, coverage-reports, visual-regression-reports]

  design:
    title: UI/UX Designer
    tier: implementation
    description: >
      Creates wireframes, mockups, and interaction designs. Implements
      production-grade frontend code with high design quality.
    tools: [Read, Glob, Grep, Edit, Write, mcp__gemini-media__generate_image, mcp__gemini-media__generate_video]
    can_spawn: []
    can_consult: [dev, qa, ai-artist]
    escalates_to: art-director
    memory_patterns:
      reads:  [design-system, brand-guidelines, feature-specs]
      writes: [design-specs, component-designs, visual-assets]

  ai-artist:
    title: AI Artist
    tier: implementation
    description: >
      Generates production-ready visual assets using AI models (Nano Banana,
      Nano Banana Pro, Imagen 4, Veo 3.1). Runs background removal and
      post-processing pipeline. Delivers files for art-director approval.
    tools: [Read, Glob, Grep, Edit, Write, Bash, mcp__gemini-media__generate_image, mcp__gemini-media__generate_video]
    can_spawn: []
    can_consult: [design, art-director]
    escalates_to: art-director
    memory_patterns:
      reads:  [brand-guidelines, tasks-ai-artist]
      writes: [generated-assets]

  # === OPERATIONS TIER ===

  deployment-engineer:
    title: Deployment Engineer
    tier: fast  # Mostly automated, validation-focused
    description: >
      Handles merges, releases, and deployment after leadership approval.
      Only acts on approved workstreams.
    tools: [Read, Glob, Grep, Bash]
    can_spawn: []
    can_consult: [dev, qa]
    escalates_to: engineering-director
    memory_patterns:
      reads:  [approvals, workstream-status, deployment-queue]
      writes: [deployment-status, release-notes]

  # === SUPERVISOR (meta-agent) ===

  supervisor:
    title: Supervisor Agent
    tier: fast  # Quick monitoring and validation
    description: >
      Monitors agent activities, enforces depth limits (max 3), detects loops,
      and triggers escalations. Runs passively, checking memory state.
    tools: [Read, Glob, Grep]
    can_spawn: []  # Supervisor doesn't spawn, it monitors
    escalates_to: engineering-director  # Reports issues to leadership
    memory_patterns:
      reads:  [all]  # Supervisor reads everything
      writes: [supervisor-alerts, escalation-triggers]

# ----------------------------------------------------------------------------
# Team Compositions (for workflow skills)
# ----------------------------------------------------------------------------
# These define which agents participate in team-level skills like
# /mg-leadership-team, /mg-build, etc.

teams:
  leadership-team:
    description: Strategic decisions, executive reviews, code review approvals
    members: [ceo, cto, engineering-director]
    default_tier: reasoning  # Team-level operations use reasoning model

  product-team:
    description: Product definition, requirements, and UX
    members: [product-owner, product-manager, design]
    default_tier: implementation

  engineering-team:
    description: TDD/BDD development cycle with 99% coverage
    members: [engineering-manager, staff-engineer, dev, qa]
    default_tier: implementation

  design-team:
    description: UI/UX design with visual regression, frontend implementation, and AI asset generation
    members: [art-director, design, ai-artist]
    default_tier: implementation

# ----------------------------------------------------------------------------
# Memory Protocol
# ----------------------------------------------------------------------------
# Defines how agents communicate through shared memory.

memory:
  base_path: .claude/memory

  # Standard file patterns for memory communication
  patterns:
    # Workstream state (phase, progress, blockers)
    workstream: "workstream-{workstream_id}-state.json"

    # Agent decisions and outputs
    agent_decisions: "agent-{agent_id}-decisions.json"

    # Task queue for an agent
    task_queue: "tasks-{agent_id}.json"

    # Escalation requests
    escalations: "escalations.json"

    # Supervisor alerts
    supervisor: "supervisor-alerts.json"

  # Polling behavior
  polling:
    enabled: true
    # Agents check for new tasks in their queue
    check_pattern: "tasks-{agent_id}.json"

  # Return envelope format (matches your WS-3 implementation)
  return_format:
    required_fields: [status, agent_id, timestamp]
    optional_fields: [workstream_id, metrics, result, escalation]
    statuses: [success, failure, partial, escalate]

# ----------------------------------------------------------------------------
# Workflow Configuration
# ----------------------------------------------------------------------------

workflow:
  name: TDD/BDD Cyclical with Visual Regression

  # Maximum delegation depth (enforced by supervisor)
  max_depth: 3

  # Coverage requirements
  coverage:
    target: 99
    unit: true
    integration: true

  stages:
    - name: planning
      owner: leadership-team
      outputs: [executive-review, workstream-breakdown]

    - name: test_specification
      owner: [qa, product-manager]
      outputs: [failing-tests, visual-baselines]
      gate: tests_written

    - name: implementation
      owner: dev
      inputs: [failing-tests]
      outputs: [passing-code]
      gate: tests_pass_and_coverage_met

    - name: verification
      owner: qa
      outputs: [qa-signoff, visual-regression-report]
      gate: qa_approved

    - name: visual_review
      owner: design-team
      condition: visual_changes_detected
      outputs: [design-approval]
      gate: design_approved

    - name: internal_review
      owner: staff-engineer
      outputs: [code-review-approval]
      gate: code_review_passed

    - name: executive_review
      owner: leadership-team
      outputs: [final-approval]
      gate: leadership_approved

    - name: deployment
      owner: deployment-engineer
      inputs: [final-approval]
      outputs: [merged, deployed]

# ----------------------------------------------------------------------------
# Engineering Principles (shared context for all agents)
# ----------------------------------------------------------------------------

principles:
  tdd_bdd:
    rule: Tests are written BEFORE code
    workflow: Red -> Green -> Refactor

  configuration_over_composition:
    rule: Prefer config objects over deep class hierarchies
    rationale: Easier to test, serialize, and maintain

  dry:
    rule: Don't Repeat Yourself
    enforcement: If you write it twice, extract it

  coverage:
    target: 99%
    types: [unit, integration]

  visual_regression:
    tool: Playwright
    workflow: Screenshots compared against baselines
    approval: Design team must approve visual changes
